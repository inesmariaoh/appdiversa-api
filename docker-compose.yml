services:
  backend:
    build: .
    container_name: appdiversa_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  db:
    image: mysql:8.0
    container_name: appdiversa_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: appdiversa
      MYSQL_USER: appdiversa_user
      MYSQL_PASSWORD: appdiversa_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init-grants.sql:/docker-entrypoint-initdb.d/init-grants.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
